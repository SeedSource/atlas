version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      patch-updates:
        update-types:
          - patch
      minor-updates:
        update-types:
          - minor
    ignore:
      # CUDA FFI binding — pin intentionally, update manually with CUDA toolkit.
      - dependency-name: cudarc

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    groups:
      actions-all:
        patterns:
          - "*"
