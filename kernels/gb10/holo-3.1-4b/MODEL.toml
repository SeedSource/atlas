[model]
name = "holo-3.1-4b"
hf_id = "Hcompany/Holo-3.1-4B"
params = "4B"
active_params = "4B"
architecture = "Gated DeltaNet + Full Attention + Dense FFN + Qwen3-VL ViT"

layers_total = 32
layers_linear_attention = 24
layers_full_attention = 8
layer_pattern = "3:1 (linear, linear, linear, full)"

# Dense FFN (no MoE) — the mid sibling between Holo-3.1-0.8B and the
# 35B-A3B MoE. Same hybrid GDN + full-attention trunk + Qwen3-VL ViT,
# plain SwiGLU MLP. full_attention_interval=4 → 8 full / 24 linear.
intermediate_size = 9216

hidden_dim = 2560
head_dim = 256
q_heads = 16
kv_heads = 4

linear_attn_key_heads = 16
linear_attn_key_dim = 128
linear_attn_value_heads = 32
linear_attn_value_dim = 128
linear_conv_kernel = 4

vocab_size = 248320
max_position_embeddings = 262144
rope_theta = 10000000
partial_rotary_factor = 0.25
attn_output_gate = true

mrope_interleaved = true
mrope_section = [11, 11, 10]
mtp_layers = 0
vision = true
image_token_id = 248056

# POC target: keep the default demo footprint small; callers can still pass a
# larger max sequence length after validating memory.
effective_context = 4096

[sampling.thinking_text]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.thinking_coding]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.non_thinking]
temperature = 0.7
top_p = 0.8
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.tools]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[behavior]
thinking_default = true
thinking_in_tools = true
max_thinking_budget = 768
max_inter_tool_prose = 384
max_post_think_content_tokens = 8192
default_num_drafts = 0
tool_call_parser = "qwen3_coder"

# Dense Qwen3.5/Holo: model_type stays "qwen3_5" (num_experts == 0). MRoPE is
# present but the qwen3_5 -> qwen3_6_moe rewrite is gated on is_moe, so dense
# checkpoints keep `qwen3_5` and resolve here by hidden_size. MRoPE is applied
# at runtime via the mrope_interleaved / mrope_section flags above.
[[model_types]]
model_type = "qwen3_5"
hidden_size = 2560

[kernel]
moe_gate_shmem_bytes = 4096
